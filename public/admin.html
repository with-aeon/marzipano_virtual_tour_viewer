<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCDE - IPVT</title>
    <link rel="icon" type="image/x-icon" href="assets/dep_eng.png">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header id="pano-header">
        <span id="pano-header-text"></span>
        <!-- group the logout button and menu link so they sit next to each other -->
        <div id="header-controls">
            <button id="logout-btn" class="logout-btn">
                <img src="assets/delete.png" class="icons">Logout
            </button>
            <a href="index.html" id="pano-menu-btn">
                <img src="assets/dashboard.png" class="icons">Menu
            </a>
        </div>
        <div id="pano-sidebar-wrapper">
            <aside id="pano-sidebar-container">
                <div id="pano-sidebar-tabs">
                    <button id="pano-scenes" type="button">Panoramic Scenes</button>
                    <button id="pano-floorplan" type="button">Floor Plan</button>
                </div>
                <div id="pano-sidebar-content">
                    <ul id="pano-image-list"></ul>
                    <ul id="pano-floorplan-list">
                        <li>
                            <button id="add-plan-btn" type="button">+</button>
                        </li>
                    </ul>
                </div>
            </aside>
            <button id="pano-sidebar-btn">
                <img src="assets/side-bar-hide.png">
            </button>
        </div>
    </header>
    <main id="pano-panel">
        <div id="pano-action">
            <input type="file" id="add-scene" accept="image/*" multiple hidden>
            <!-- separate input for floor plan images; its list is independent of pano-image-list -->
            <input type="file" id="add-floorplan" accept="image/*" multiple hidden>
            <label for="add-scene" id="pano-upload-btn" class="action-btn">
                <img src="assets/upload.png" class="icons"> Upload
            </label>
            <button id="pano-update-btn" class="action-btn">
                <img src="assets/update.png" class="icons"> Update
            </button>
            <button id="pano-rename-btn" class="action-btn">
                <img src="assets/rename.png" class="icons"> Rename
            </button>
            <button id="pano-delete-btn" class="action-btn">
                <img src="assets/delete.png" class="icons"> Delete
            <button id="pano-hotspot-btn" class="action-btn" type="button">
                <img src="assets/hotspot-icon.png" class="icons"> Hotspot
            </button>
            <button id="pano-initial-view-btn" class="action-btn" type="button">
                <img src="assets/initial-view.png" class="icons"> Set initial view
            </button>
          </button>
        </div>
        <div id="pano-viewer-wrap">
            <div id="pano-viewer"></div>
        </div>
    </main>
    <script type="module" src="js/app.js" defer></script>
    <script src="js/login.js"></script>
    <script>
        // Handle sidebar tabs and a separate floor plan list
        document.addEventListener('DOMContentLoaded', function () {
            const panoTab = document.getElementById('pano-scenes');
            const floorTab = document.getElementById('pano-floorplan');
            const panoList = document.getElementById('pano-image-list');
            const floorList = document.getElementById('pano-floorplan-list');
            const addPlanBtn = document.getElementById('add-plan-btn');
            const addFloorInput = document.getElementById('add-floorplan');

            if (!panoTab || !floorTab || !panoList || !floorList) return;

            function showPanos() {
                panoTab.classList.add('active-tab');
                floorTab.classList.remove('active-tab');
                panoList.style.display = 'block';
                floorList.style.display = 'none';
            }

            function showFloorplans() {
                panoTab.classList.remove('active-tab');
                floorTab.classList.add('active-tab');
                panoList.style.display = 'none';
                floorList.style.display = 'block';
            }

            // Default state: show panoramic scenes and their list only
            showPanos();

            panoTab.addEventListener('click', showPanos);
            floorTab.addEventListener('click', showFloorplans);

            // Keep a separate in-memory collection of floor plans
            const floorplans = [];

            function addFloorplanItem(fp) {
                const addLi = addPlanBtn && addPlanBtn.parentElement;
                if (!addLi) return;
                const li = document.createElement('li');
                li.textContent = fp.name;
                // Insert before the "+" button row so that stays last
                floorList.insertBefore(li, addLi);
            }

            if (addPlanBtn && addFloorInput) {
                // "+" behaves like Upload: open file chooser for floor plans
                addPlanBtn.addEventListener('click', function () {
                    addFloorInput.click();
                });

                addFloorInput.addEventListener('change', function () {
                    const files = Array.from(addFloorInput.files || []);
                    files.forEach(file => {
                        const fp = { name: file.name };
                        floorplans.push(fp);
                        addFloorplanItem(fp);
                    });
                    // allow same file to be selected again later
                    addFloorInput.value = '';
                });
            }
        });
    </script>
</body>
</html>
