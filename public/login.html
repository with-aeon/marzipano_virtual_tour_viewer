<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QCDE IPVT</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/NEW-LOGO-QCDE.png"> 
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-main">
        <section class="login-container">
            <header class="login-header">
                <img src="assets/icons/NEW-LOGO-QCDE.png" class="login-logo" alt="QCDE Logo">
                <div class="login-brand">
                    <h1 class="login-title">QCDE - IPVT</h1>
                    <p class="login-subtitle">Infrastructure Projects Virtual Tour</p>
                </div>
            </header>
            
            <form id="login-form" class="login-form">
                <h2 id="login-sub-header">Sign In</h2>
                <div class="form-group">
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="username">
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="password">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary login-btn">LOGIN</button>
                </div>
                
                <p class="login-error" id="login-error" role="alert"></p>
            </form>
        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
