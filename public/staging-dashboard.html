<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCDE - IPVT (Staging)</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/NEW-LOGO-QCDE.png"> 
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <main class="dashboard">
        <section id="dashboard-title">
            <img src="assets/icons/NEW-LOGO-QCDE.png"> 
            <h1>QCDE - IPVT (Staging)</h1>
            <button id="logout-btn" class="logout-btn" data-logout-message="Are you sure you want to log out?">
                <img src="assets/icons/log-out.png" class="icons">Logout
            </button>
        </section>
        <div id="project-container">
            <section id="project-toolbar">
                <div class="action-bar">
                    <button type="button" class="action-btn" id="btn-new-project">
                        <img src="assets/add-project.png" class="icons" style="width: 30px; height: 30px;"> CREATE NEW PROJECT
                    </button>
                    <button type="button" class="action-btn" id="btn-open-project">
                        <img src="assets/open.png" class="icons" style="width: 30px; height: 30px;"> OPEN EXISTING PROJECT
                    </button>
                    <a class="action-btn" id="btn-go-published" href="dashboard.html" style="text-decoration:none;display:flex;align-items:center;">
                        <img src="assets/icons/dashboard.png" class="icons" style="width: 24px; height: 24px;"> PUBLISHED DASHBOARD
                    </a>
                </div>
                <div class="project-search-wrap">
                    <span class="project-search-icon">
                    <img src="assets/search.png">
                    </span>
                    <input type="text" id="project-search-input" class="project-search-input" placeholder="Search" autocomplete="off">
                </div>
            </section>
            <div class="project-table-scroll" id="project-table-scroll">
                <section id="project-container-header">
                    <p>Project Number</p>
                    <p>Project Name</p>
                    <p>Status</p>
                    <p id="header-action">Action</p>
                </section>
                <section class="project-list" id="project-list"></section>
            </div>
        </div>
        <p class="empty-state" id="empty-state">No draft projects yet. Create one to get started.</p>
    </main>

    <div class="modal-overlay" id="new-project-modal">
        <div class="modal">
            <h2>NEW PROJECT (DRAFT)</h2>
            <div class="form-group">
                <label for="new-project-number">Project Number</label>
                <input
                    type="text"
                    id="new-project-number"
                    placeholder="Project Number"
                    maxlength="20"
                    pattern="[A-Za-z0-9\\-]*"
                >
            </div>
            <div class="form-group">
                <label for="new-project-name">Project Name</label>
                <input type="text" id="new-project-name" placeholder="Project Name" maxlength="100">
            </div>
            <p class="modal-error" id="new-project-error" role="alert"></p>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
                <button type="button" class="btn-primary" id="modal-create">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="open-project-modal">
        <div class="modal open-project-modal">
            <div class="open-project-modal-header">
                <h2 class="open-project-header-element">OPEN DRAFT PROJECT</h2>
                <div class="project-search-wrap">
                    <input type="text" id="open-project-search-input" class="project-search-input" placeholder="Search" autocomplete="off">
                </div>
                <button id="open-modal-close" class="modal-close" type="button" aria-label="Close">✕</button>
            </div>
            <div class="open-project-list" id="open-project-list"></div>
        </div>
    </div>

    <script type="module" src="js/staging-dashboard.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
